spring:
  application:
    name: library-api

  # ===== DATABASE =====
  # H2 is an in-memory database — no installation needed, resets on every restart
  datasource:
    url: jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # create-drop: recreates the schema on startup and drops it on shutdown (dev only)
      # In production use: validate or none
      ddl-auto: create-drop
    show-sql: false  # Set to true to print SQL queries to the console

  # H2 web console — inspect data in the browser at http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  # ===== REDIS (CACHING) =====
  # Redis is a fast in-memory store used to cache frequently accessed data
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms  # If Redis does not respond within 2 seconds, fail fast

  # Cache type: redis = use Redis, simple = in-memory fallback (no Redis needed)
  cache:
    type: redis

  # ===== SPRING VAULT (SECRETS MANAGEMENT) =====
  # Vault stores sensitive configuration (passwords, keys) outside the codebase
  # The optional: prefix means the app starts normally even if Vault is not running
  config:
    import: "optional:vault://"

  cloud:
    vault:
      enabled: true
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: http
      authentication: token
      token: ${VAULT_TOKEN:dev-root-token}
      kv:
        enabled: true
        backend: secret
        # Spring reads secrets from the Vault path: secret/library-api
        default-context: library-api

# ===== JWT =====
# In production, app.jwt.secret should come from Vault, not from this file
# Store it with: vault kv put secret/library-api app.jwt.secret="your-strong-secret"
app:
  jwt:
    secret: ${JWT_SECRET:library-api-super-secret-key-minimum-256-bits-long-for-hmac-sha256}
    expiration-ms: 86400000  # Token validity: 24 hours

# ===== ACTUATOR (MONITORING) =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized

# ===== CIRCUIT BREAKER (Resilience4j) — VG =====
resilience4j:
  circuitbreaker:
    instances:
      openLibrary:
        # Register circuit breaker state in /actuator/health
        register-health-indicator: true
        # Measure failure rate over the last 10 calls
        sliding-window-size: 10
        # Open the circuit if 50% or more of the last 10 calls failed
        failure-rate-threshold: 50
        # Wait 30 seconds in the OPEN state before trying again (HALF-OPEN)
        wait-duration-in-open-state: 30s
        # In HALF-OPEN state, allow 3 test requests to check if the service recovered
        permitted-number-of-calls-in-half-open-state: 3

logging:
  level:
    com.library.api: INFO
    org.springframework.security: WARN
