name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Test
  # Runs on every push and pull request to main. Guarantees that a change
  # never breaks existing functionality before anything gets built or shipped.
  # ───────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn -B test

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Dependency Vulnerability Scan (OWASP A06 — Vulnerable and Outdated
  # Components). Scans every third-party dependency against the NVD database.
  # The job — and therefore the whole pipeline — fails if a dependency has a
  # known vulnerability at or above the CVSS threshold set in pom.xml, which
  # blocks a vulnerable build from ever reaching the docker-build-push job.
  # ───────────────────────────────────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency-Check
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-dependency-check-data

      - name: Run dependency vulnerability scan
        # NVD_API_KEY is optional but strongly recommended — without it the
        # NVD feed download is rate-limited and the first run can be slow.
        run: mvn org.owasp:dependency-check-maven:check -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Build & Publish Docker Image
  # Only runs on a successful push to main (not on PRs) — every image
  # published to Docker Hub corresponds to a tested, scanned commit on main.
  # Credentials come from GitHub Secrets and are never printed in the logs.
  # ───────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Build and Push Docker Image
    needs: [ build-and-test, dependency-check ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image name
        id: meta
        run: echo "image=${{ secrets.DOCKERHUB_USERNAME }}/library-api" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy
  # Fully automated, no manual approval step. In place of a real hosting
  # platform, this simulates a deployment by announcing the release. If
  # DEPLOY_WEBHOOK_URL is configured as a repo secret, it also triggers that
  # webhook (e.g. a Render/Railway deploy hook) — otherwise it's a no-op log.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Simulate automated deployment
        run: |
          echo "Deploying ${{ needs.docker-build-push.outputs.image }}:${{ github.sha }} to production..."
          echo "Deployment complete."

      - name: Trigger deployment webhook (optional)
        # The "secrets" context isn't readable from a step "if:" condition,
        # so the empty check has to happen inside the shell script instead.
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -n "$DEPLOY_WEBHOOK_URL" ]; then
            curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"
          else
            echo "No DEPLOY_WEBHOOK_URL secret configured; skipping webhook call."
          fi
